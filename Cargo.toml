[package]
name = "lasada"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
chrono = "0.4.44"
colored = "3.1.1"
config = "0.15.22"
dotenv = "0.15.0"
fern = "0.7.1"
futures-util = "0.3.32"
indicatif = "0.18.4"
log = "0.4.29"
regex = "1.12.3"
reqwest = { version = "0.13.2", default-features = false, features = ["json", "stream", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
