toml = "1.1.2"
clap = { version = "4.5.23", features = ["derive"] }
tiktoken-rs = "0.6.0"
termimad = "0.31.1"
crossterm = "0.28.1"
dialoguer = "0.11.0"
sysinfo = "0.33.1"
